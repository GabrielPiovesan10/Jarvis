<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>JARVIS OS - GABRIEL 2.5 LITE</title>
    <style>
        :root { --glow: #00d2ff; --bg: #000; --error: #ff4444; }
        body { background: var(--bg); color: var(--glow); font-family: sans-serif; display: flex; flex-direction: column; justify-content:center; align-items:center; height:100vh; margin:0; overflow:hidden; }
        .orb-container { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .orb { width: 105px; height: 105px; background: radial-gradient(circle, var(--glow) 0%, #004d7a 100%); border-radius: 50%; box-shadow: 0 0 60px var(--glow), inset 0 0 25px #fff; transition: 0.3s; z-index: 2; }
        .ring { position: absolute; width: 165px; height: 165px; border: 2px solid var(--glow); border-radius: 50%; border-top-color: transparent; border-bottom-color: transparent; animation: spin 3s linear infinite; opacity: 0.6; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status { text-transform: uppercase; letter-spacing: 2px; font-size: 10px; margin-top: 35px; text-align: center; color: #fff; min-height: 3em; max-width: 85%; line-height: 1.5; }
        .btn { padding: 15px 40px; background: transparent; border: 1px solid var(--glow); color: var(--glow); font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; border-radius: 4px; }
        .overload-orb { background: radial-gradient(circle, var(--error) 0%, #7a0000 100%) !important; box-shadow: 0 0 60px var(--error) !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="orb-container" onclick="forcarReativacao()">
        <div class="ring" id="ring"></div>
        <div id="orb" class="orb"></div>
    </div>

    <div id="status">SISTEMA EM AGUARDO</div>
    <button id="btn" class="btn" onclick="boot()">INICIALIZAR NÚCLEO 2.5 LITE</button>

<script>
    const orb = document.getElementById('orb'), st = document.getElementById('status'), bt = document.getElementById('btn'), ring = document.getElementById('ring');
    let API_KEY = localStorage.getItem("GEMINI_API_KEY") || prompt("Insira sua chave:");
    if(API_KEY) localStorage.setItem("GEMINI_API_KEY", API_KEY);

    let jarvisOcupado = false;
    let resfriando = false;
    let reconhecimento;

    function falar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'pt-BR'; m.rate = 1.0;
        m.onstart = () => { jarvisOcupado = true; st.innerText = "JARVIS FALANDO..."; };
        m.onend = () => { 
            if (!resfriando) {
                st.innerText = "NÚCLEO PRONTO";
                setTimeout(() => { 
                    jarvisOcupado = false; 
                    try { reconhecimento.start(); } catch(e){} 
                }, 1000); 
            }
        };
        window.speechSynthesis.speak(m);
    }

    async function perguntarIA(pergunta) {
        if (jarvisOcupado || resfriando) return;
        jarvisOcupado = true;
        st.innerText = "SINCRONIZANDO 2.5 LITE...";

        try {
            // ATUALIZADO PARA GEMINI-2.5-FLASH-LITE
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Você é o JARVIS. Mestre: GABRIEL. Responda de forma curta. Pergunta: ${pergunta}` }] }] })
            });

            if (response.status === 429) {
                resfriando = true;
                st.innerText = "LIMITE EXCEDIDO. RESFRIANDO...";
                orb.classList.add('overload-orb');
                falar("Mestre, limite de dez requisições atingido. Aguarde o resfriamento.");
                setTimeout(() => { 
                    orb.classList.remove('overload-orb'); 
                    resfriando = false;
                    jarvisOcupado = false;
                    st.innerText = "ESTÁVEL. TOQUE NA ESFERA.";
                }, 60000);
                return;
            }

            const data = await response.json();
            falar(data.candidates[0].content.parts[0].text);
        } catch (e) {
            st.innerText = "ERRO NO NÚCLEO";
            jarvisOcupado = false;
        }
    }

    function forcarReativacao() {
        if (resfriando) return;
        try { reconhecimento.stop(); } catch(e){}
        setTimeout(() => { 
            try { 
                reconhecimento.start(); 
                st.innerText = "OUVINDO..."; 
                jarvisOcupado = false;
            } catch(e){} 
        }, 500);
    }

    async function boot() {
        bt.classList.add('hidden');
        falar("Protocolos 2.5 Lite ativos. Jarvis online.");
        
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        reconhecimento = new SpeechRec();
        reconhecimento.lang = 'pt-BR';
        reconhecimento.continuous = true;

        reconhecimento.onresult = (e) => {
            const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
            if (cmd.includes("jarvis") && !jarvisOcupado) {
                reconhecimento.stop();
                perguntarIA(cmd.replace("jarvis", ""));
            }
        };
        reconhecimento.onend = () => { if(!jarvisOcupado && !resfriando) reconhecimento.start(); };
        reconhecimento.start();
    }
</script>
</body>
</html>
