<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>JARVIS OS - 3.1 ULTIMATE</title>
    <style>
        :root { --glow: #00d2ff; --bg: #000; }
        body { background: var(--bg); color: var(--glow); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; justify-content:center; align-items:center; height:100vh; margin:0; overflow:hidden; }
        #hud { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; font-family: monospace; font-size: 10px; opacity: 0.8; color: var(--glow); text-shadow: 0 0 5px var(--glow); }
        .orb-container { position: relative; width: 220px; height: 220px; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-top: 20px; -webkit-tap-highlight-color: transparent; }
        
        /* O CORPO VISUAL DO JARVIS: CARREGADO DE ARQUIVO LOCAL */
        .avatar { position: absolute; width: 170px; height: 170px; background-size: cover; border-radius: 50%; border: 2px solid var(--glow); box-shadow: 0 0 40px var(--glow), inset 0 0 20px #fff; animation: float 6s ease-in-out infinite, pulse 3s ease-in-out infinite; z-index: 2; opacity: 1; transition: opacity 1s; }
        .avatar-loading { display: none; } /* Esconde o avatar se a imagem falhar */

        .ring { position: absolute; width: 200px; height: 200px; border: 1px solid var(--glow); border-radius: 50%; border-top-color: transparent; border-bottom-color: transparent; animation: spin 4s linear infinite; opacity: 0.3; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 40px var(--glow), inset 0 0 20px #fff; } 50% { box-shadow: 0 0 70px var(--glow), inset 0 0 25px #fff; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #status { text-transform: uppercase; letter-spacing: 2px; font-size: 10px; margin-top: 45px; text-align: center; color: #fff; min-height: 2em; text-shadow: 0 0 5px var(--glow); }
        #user-text { font-family: monospace; font-size: 13px; color: rgba(0, 210, 255, 0.6); margin-top: 10px; text-align: center; max-width: 85%; font-style: italic; min-height: 1.5em; }
        .btn { padding: 15px 40px; background: transparent; border: 1px solid var(--glow); color: var(--glow); font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 25px; border-radius: 4px; z-index: 3; }
        .btn-reset { margin-top: 20px; font-size: 9px; padding: 5px 15px; border-color: #333; color: #555; cursor: pointer; background: transparent; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div>CORDEIRÓPOLIS-SP</div>
        <div id="hud-temp">--°C</div>
        <div id="hud-time">00:00:00</div>
    </div>

    <div class="orb-container" onclick="forcarReativacao()">
        <div class="ring"></div>
        <img id="avatar" class="avatar avatar-loading" src="avatar.PNG" alt="Jarvis Avatar" onerror="this.classList.add('avatar-loading'); document.getElementById('status').innerText = 'ERRO NA IMAGEM';" onload="this.classList.remove('avatar-loading'); this.style.opacity = 1;">
    </div>

    <div id="status">SISTEMA EM AGUARDO</div>
    <div id="user-text"></div>

    <button id="btn" class="btn" onclick="boot()">INICIAR JARVIS</button>
    
    <div id="tools" class="hidden" style="display: flex; gap: 10px;">
        <button class="btn-reset" onclick="verMemoria()">VER MEMÓRIA</button>
        <button class="btn-reset" onclick="limparMemoria()">LIMPAR MEMÓRIA</button>
        <button class="btn-reset" onclick="resetarChave()">TROCAR CHAVE</button>
    </div>

<script>
    const avatar = document.getElementById('avatar'), st = document.getElementById('status'), ut = document.getElementById('user-text'), bt = document.getElementById('btn'), tools = document.getElementById('tools');
    let API_KEY = localStorage.getItem("GEMINI_API_KEY");
    let tempAtual = "20"; 
    let timerSilencio;
    let historicoSessao = []; 

    function clock() { document.getElementById('hud-time').innerText = new Date().toLocaleTimeString('pt-BR'); }
    setInterval(clock, 1000);

    async function getClima() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-22.4806&longitude=-47.4522&current_weather=true`);
            const data = await res.json();
            tempAtual = Math.round(data.current_weather.temperature);
            document.getElementById('hud-temp').innerText = tempAtual + "°C";
        } catch(e) {}
    }
    getClima();

    function verMemoria() {
        let mem = localStorage.getItem('jarvis_memory');
        if(mem) alert("MEMÓRIA DE LONGO PRAZO DO JARVIS:\n\n" + mem);
        else alert("A mente do Jarvis está vazia.");
    }

    function limparMemoria() {
        if(confirm("Deseja apagar todas as lembranças do Jarvis?")) {
            localStorage.removeItem('jarvis_memory');
            historicoSessao = [];
            falar("Memórias de curto e longo prazo apagadas. Sistema limpo, mestre.");
        }
    }

    function resetarChave() {
        localStorage.removeItem("GEMINI_API_KEY");
        location.reload();
    }

    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

    let jarvisOcupado = false, reconhecimento;

    function falar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'pt-BR'; 
        m.rate = 0.9;  
        m.pitch = 0.8; 

        let vozes = window.speechSynthesis.getVoices();
        let vozExata = vozes.find(v => v.lang.includes('pt') && (
            v.name.includes('Felipe') || v.name.includes('Daniel') || v.name.includes('Siri Voz 1')
        ));
        
        if (vozExata) { m.voice = vozExata; }

        m.onstart = () => { jarvisOcupado = true; st.innerText = "JARVIS FALANDO..."; };
        m.onend = () => { st.innerText = "NÚCLEO PRONTO"; setTimeout(() => { jarvisOcupado = false; try{reconhecimento.start();}catch(e){} }, 1000); };
        window.speechSynthesis.speak(m);
    }

    async function perguntarIA(pergunta) {
        if (jarvisOcupado) return;
        jarvisOcupado = true;
        st.innerText = "PROCESSANDO...";
        
        const agora = new Date();
        const dataAtual = agora.toLocaleDateString('pt-BR');
        const h = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        
        let memoria = localStorage.getItem('jarvis_memory') || "Ainda não há anotações.";
        let contextoRecente = historicoSessao.map(m => `Mestre: ${m.q}\nJarvis: ${m.a}`).join('\n\n');

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `
                    Você é o assistente JARVIS. Mestre: GABRIEL.
                    DADOS: Cordeirópolis. Hoje é dia ${dataAtual}, são ${h} e faz ${tempAtual}°C.
                    MEMÓRIA DE LONGO PRAZO DO GABRIEL: ${memoria}.
                    
                    CONVERSA ATUAL (ÚLTIMAS FALAS):
                    ${contextoRecente}

                    DIRETRIZES DE PERSONA:
                    - Aja com a personalidade de um mordomo britânico leal e extremamente humano.
                    - É TERMINANTEMENTE PROIBIDO falar "não tenho informações", "banco de dados", "sistema", ou "IA".
                    - Finja ter uma mente real e use a CONVERSA ATUAL acima para entender o contexto das perguntas e continuar o assunto naturalmente.

                    REGRAS CRÍTICAS DE AÇÃO:
                    1. LEITURA DE MEMÓRIA (OBRIGATÓRIO): Se o mestre testar seus conhecimentos sobre ele, VOCÊ DEVE LER AS INFORMAÇÕES NA [MEMÓRIA DE LONGO PRAZO] e responder.
                    2. APRENDER: Se o mestre pedir para lembrar algo, gere APENAS a tag oculta [APRENDER: fato].
                    3. RESPOSTA DE GRAVAÇÃO: Ao aprender algo novo, responda APENAS: "Anotado, senhor." ou "Guardado em minha memória." Não explique nada.
                    4. ESQUECER: Use [ESQUECER: palavra-chave] para apagar.
                    5. LIMITAÇÕES: Você NÃO consegue tocar músicas, abrir aplicativos ou controlar a casa. Se o mestre pedir isso, diga educadamente que você não possui integração com o sistema de som.
                    6. Seja direto, no máximo 2 ou 3 frases.
                    
                    Pergunta atual do mestre: "${pergunta}"` 
                }] }] })
            });

            const data = await response.json();
            let txt = data.candidates[0].content.parts[0].text;
            let respostaLimpaParaHistorico = txt;

            if (txt.includes("[APRENDER:")) {
                const fato = txt.match(/\[APRENDER:\s*(.*?)\]/);
                if (fato) {
                    let memoriaAtual = localStorage.getItem('jarvis_memory') || "";
                    let novaMemoria = memoriaAtual ? memoriaAtual + " | " + fato[1] : fato[1];
                    localStorage.setItem('jarvis_memory', novaMemoria);
                    txt = txt.replace(/\[APRENDER:.*?\]/g, "").trim();
                    respostaLimpaParaHistorico = txt;
                }
            }

            if (txt.includes("[ESQUECER:")) {
                const fatoApagar = txt.match(/\[ESQUECER:\s*(.*?)\]/);
                if (fatoApagar) {
                    let memoriaAtual = localStorage.getItem('jarvis_memory') || "";
                    let palavraChave = fatoApagar[1].toLowerCase();
                    let memoriasArray = memoriaAtual.split(" | ");
                    let novaMemoriaArray = memoriasArray.filter(item => !item.toLowerCase().includes(palavraChave));
                    localStorage.setItem('jarvis_memory', novaMemoriaArray.join(" | ")).trim();
                    txt = txt.replace(/\[ESQUECER:.*?\]/g, "").trim();
                    respostaLimpaParaHistorico = txt;
                }
            }
            
            historicoSessao.push({q: pergunta, a: respostaLimpaParaHistorico});
            if(historicoSessao.length > 4) historicoSessao.shift();

            falar(txt);
        } catch (e) { st.innerText = "ERRO NO NÚCLEO"; jarvisOcupado = false; }
    }

    function forcarReativacao() {
        ut.innerText = "";
        try { reconhecimento.stop(); } catch(e){}
        setTimeout(() => { try { reconhecimento.start(); st.innerText = "OUVINDO..."; jarvisOcupado = false; } catch(e){} }, 500);
    }

    async function boot() {
        if(!API_KEY) { API_KEY = prompt("Insira sua API KEY:"); localStorage.setItem("GEMINI_API_KEY", API_KEY); }
        bt.classList.add('hidden');
        tools.classList.remove('hidden');
        falar("Regeneração de corpo concluída. É uma honra ter uma forma visual, senhor.");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function animar() {
                analyser.getByteFrequencyData(dataArray);
                let vol = dataArray.reduce((a, b) => a + b) / dataArray.length;
                
                // O AVATAR AGORA É ANIMADO DIRETAMENTE PELA IMAGEM
                avatar.style.transform = `scale(${1 + (vol / 120)})`;
                requestAnimationFrame(animar);
            }
            animar();

            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconhecimento = new SpeechRec();
            reconhecimento.lang = 'pt-BR'; reconhecimento.continuous = true; reconhecimento.interimResults = true;

            reconhecimento.onresult = (e) => {
                const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
                ut.innerText = `"${transcript}"`;
                
                if (transcript.includes("jarvis") && !jarvisOcupado) {
                    clearTimeout(timerSilencio);
                    timerSilencio = setTimeout(() => {
                        reconhecimento.stop();
                        const p = transcript.split("jarvis").pop().trim();
                        if(p.length > 1) perguntarIA(p);
                        else { try{reconhecimento.start();}catch(e){} }
                    }, 2000); 
                }
            };
            reconhecimento.onend = () => { if(!jarvisOcupado) reconhecimento.start(); };
            reconhecimento.start();
        } catch (err) { st.innerText = "FALHA NO MICROFONE"; }
    }
</script>
</body>
</html>
