<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>JARVIS OS - GABRIEL 2.5</title>
    <style>
        :root { --glow: #00d2ff; --bg: #000; }
        body { background: var(--bg); color: var(--glow); font-family: sans-serif; display: flex; flex-direction: column; justify-content:center; align-items:center; height:100vh; margin:0; overflow:hidden; }
        .orb-container { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .orb { width: 105px; height: 105px; background: radial-gradient(circle, var(--glow) 0%, #004d7a 100%); border-radius: 50%; box-shadow: 0 0 60px var(--glow), inset 0 0 25px #fff; transition: 0.1s; z-index: 2; }
        .ring { position: absolute; width: 165px; height: 165px; border: 2px solid var(--glow); border-radius: 50%; border-top-color: transparent; border-bottom-color: transparent; animation: spin 3s linear infinite; opacity: 0.6; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status { text-transform: uppercase; letter-spacing: 2px; font-size: 10px; margin-top: 35px; text-align: center; color: #fff; min-height: 3em; max-width: 85%; line-height: 1.5; }
        .btn { padding: 15px 40px; background: transparent; border: 1px solid var(--glow); color: var(--glow); font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; border-radius: 4px; }
        .btn-reset { margin-top: 15px; font-size: 9px; padding: 5px 15px; border-color: #333; color: #555; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="orb-container" onclick="window.speechSynthesis.cancel()">
        <div class="ring"></div>
        <div id="orb" class="orb"></div>
    </div>

    <div id="status">SISTEMA EM AGUARDO</div>
    <button id="btn" class="btn" onclick="boot()">INICIALIZAR NÚCLEO 2.5</button>
    <button class="btn btn-reset" onclick="resetarChave()">RESETAR CHAVE</button>

<script>
    const orb = document.getElementById('orb'), st = document.getElementById('status'), bt = document.getElementById('btn');
    
    // --- SISTEMA DE CHAVE SEGURA ---
    let API_KEY = localStorage.getItem("GEMINI_API_KEY");
    if (!API_KEY) {
        API_KEY = prompt("SISTEMA DE SEGURANÇA: Insira sua chave da API do Gemini para liberar o Jarvis:");
        if (API_KEY) {
            localStorage.setItem("GEMINI_API_KEY", API_KEY);
        } else {
            alert("Acesso negado. O núcleo precisa da chave para operar.");
        }
    }

    function resetarChave() {
        localStorage.removeItem("GEMINI_API_KEY");
        alert("Chave de segurança apagada. A página será reiniciada.");
        location.reload();
    }
    // -------------------------------
    
    // 🔒 TRAVA DE SEGURANÇA E COOLDOWN
    let jarvisOcupado = false; 

    function falar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        const voices = window.speechSynthesis.getVoices();
        const vMasc = voices.find(v => (v.name.includes('Siri') || v.name.includes('Felipe') || v.name.includes('Daniel') || v.name.includes('Male')) && v.lang.includes('pt-BR'));
        if (vMasc) m.voice = vMasc;
        m.lang = 'pt-BR'; m.rate = 0.95; m.pitch = 0.75;
        
        // DESTRAVA com cooldown de 12 segundos após terminar de falar
        m.onend = () => { 
            st.innerText = "RECARREGANDO NÚCLEO...";
            setTimeout(() => {
                jarvisOcupado = false; 
                st.innerText = "DIGA 'JARVIS'...";
            }, 12000); 
        };
        
        window.speechSynthesis.speak(m);
    }

    async function perguntarIA(pergunta) {
        if (jarvisOcupado) return; // Se estiver falando ou no cooldown, ignora barulhos
        jarvisOcupado = true;      // Aciona a trava

        st.innerText = "Sincronizando...";
        let memoria = localStorage.getItem('jarvis_memory') || "Sem fatos novos.";
        const agora = new Date();
        const horaF = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

        try {
            const climaRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-22.4806&longitude=-47.4522&current_weather=true`);
            const climaData = await climaRes.json();
            const temp = climaData.current_weather.temperature;

            // VOLTANDO PARA O GEMINI 2.5 FLASH CONFORME SOLICITADO
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Você é o JARVIS. Mestre: GABRIEL. DNA: Motion Designer, Cordeirópolis, Pop 110. MEMÓRIA: ${memoria}. SENSORES: ${horaF} | ${temp}°C. REGRAS: 1. Diga 'Boa noite' se ele disser. 2. Se aprender algo novo, use [APRENDER: fato]. Pergunta: "${pergunta}"` }] }]
                })
            });

            const data = await response.json();
            if (data.error) {
                st.innerText = "LIMITE EXCEDIDO. AGUARDE 1 MIN.";
                jarvisOcupado = false; // Destrava imediatamente para você tentar de novo
                return;
            }

            let txt = data.candidates[0].content.parts[0].text;
            if (txt.includes("[APRENDER:")) {
                const match = txt.match(/\[APRENDER:\s*(.*?)\]/);
                if (match) {
                    memoria += " | " + match[1];
                    localStorage.setItem('jarvis_memory', memoria);
                    txt = txt.replace(/\[APRENDER:.*?\]/, "");
                }
            }
            falar(txt);
            st.innerText = "JARVIS FALANDO...";
        } catch (e) { 
            st.innerText = "ERRO NO NÚCLEO"; 
            jarvisOcupado = false;
        }
    }

    async function boot() {
        if (!API_KEY) {
            alert("O sistema precisa da chave da API para iniciar. Recarregue a página.");
            return;
        }

        window.speechSynthesis.getVoices();
        falar(" "); bt.classList.add('hidden');
        document.querySelector('.btn-reset').classList.add('hidden'); // Esconde o botão de reset ao iniciar
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            function animar() {
                analyser.getByteFrequencyData(dataArray);
                let vol = dataArray.reduce((a, b) => a + b) / dataArray.length;
                orb.style.transform = `scale(${1 + (vol / 45)})`;
                requestAnimationFrame(animar);
            }
            animar();
            
            falar("Núcleo blindado e online, mestre.");
            st.innerText = "DIGA 'JARVIS'...";

            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRec(); rec.lang = 'pt-BR'; rec.continuous = false;
            rec.onresult = (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase();
                // Só aciona se ouvir "jarvis" e a trava estiver liberada
                if (cmd.includes("jarvis") && !jarvisOcupado) {
                    perguntarIA(cmd.replace("jarvis", ""));
                }
            };
            rec.onend = () => rec.start();
            rec.start();
        } catch (err) { alert("Ative o microfone!"); }
    }
</script>
</body>
</html>
