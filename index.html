<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>JARVIS OS - GABRIEL 2.5</title>
    <style>
        :root { --glow: #00d2ff; --bg: #000; --error: #ff3333; }
        body { background: var(--bg); color: var(--glow); font-family: sans-serif; display: flex; flex-direction: column; justify-content:center; align-items:center; height:100vh; margin:0; overflow:hidden; }
        .orb-container { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .orb { width: 105px; height: 105px; background: radial-gradient(circle, var(--glow) 0%, #004d7a 100%); border-radius: 50%; box-shadow: 0 0 60px var(--glow), inset 0 0 25px #fff; transition: 0.3s; z-index: 2; }
        .ring { position: absolute; width: 165px; height: 165px; border: 2px solid var(--glow); border-radius: 50%; border-top-color: transparent; border-bottom-color: transparent; animation: spin 3s linear infinite; opacity: 0.6; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status { text-transform: uppercase; letter-spacing: 2px; font-size: 10px; margin-top: 35px; text-align: center; color: #fff; min-height: 3em; max-width: 85%; line-height: 1.5; transition: 0.3s; }
        .btn { padding: 15px 40px; background: transparent; border: 1px solid var(--glow); color: var(--glow); font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; border-radius: 4px; }
        .btn-reset { margin-top: 15px; font-size: 9px; padding: 5px 15px; border-color: #333; color: #555; }
        .hidden { display: none; }
        /* Estilo para quando o sistema está em resfriamento */
        .overload { color: var(--error) !important; text-shadow: 0 0 10px var(--error); }
        .overload-orb { box-shadow: 0 0 60px var(--error), inset 0 0 25px #fff !important; background: radial-gradient(circle, var(--error) 0%, #7a0000 100%) !important; }
    </style>
</head>
<body>

    <div class="orb-container" onclick="window.speechSynthesis.cancel()">
        <div class="ring" id="ring"></div>
        <div id="orb" class="orb"></div>
    </div>

    <div id="status">SISTEMA EM AGUARDO</div>
    <button id="btn" class="btn" onclick="boot()">INICIALIZAR NÚCLEO 2.5</button>
    <button id="btn-reset" class="btn btn-reset" onclick="resetarChave()">RESETAR CHAVE</button>

<script>
    const orb = document.getElementById('orb'), st = document.getElementById('status'), bt = document.getElementById('btn'), br = document.getElementById('btn-reset'), ring = document.getElementById('ring');
    
    let API_KEY = localStorage.getItem("GEMINI_API_KEY");
    if (!API_KEY) {
        API_KEY = prompt("SISTEMA DE SEGURANÇA: Insira sua chave da API:");
        if (API_KEY) localStorage.setItem("GEMINI_API_KEY", API_KEY);
    }

    function resetarChave() {
        localStorage.removeItem("GEMINI_API_KEY");
        location.reload();
    }
    
    let jarvisOcupado = false; 
    let reconhecimento;

    function falar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        const voices = window.speechSynthesis.getVoices();
        const vMasc = voices.find(v => (v.name.includes('Daniel') || v.name.includes('Male')) && v.lang.includes('pt-BR'));
        if (vMasc) m.voice = vMasc;
        m.lang = 'pt-BR'; m.rate = 0.95; m.pitch = 0.75;
        
        m.onstart = () => { jarvisOcupado = true; st.innerText = "JARVIS FALANDO..."; };
        m.onend = () => { 
            if (!st.classList.contains('overload')) {
                st.innerText = "RECARREGANDO NÚCLEO...";
                setTimeout(() => {
                    jarvisOcupado = false; 
                    st.innerText = "DIGA 'JARVIS'...";
                    try { reconhecimento.start(); } catch(e) {}
                }, 12000); 
            }
        };
        window.speechSynthesis.speak(m);
    }

    // --- NOVA FUNÇÃO DE RESFRIAMENTO ---
    function iniciarResfriamento(segundos) {
        jarvisOcupado = true;
        st.classList.add('overload');
        orb.classList.add('overload-orb');
        ring.style.borderColor = "var(--error)";
        
        let tempo = segundos;
        const cronometro = setInterval(() => {
            st.innerText = `LIMITE EXCEDIDO: RESFRIANDO NÚCLEO EM ${tempo}S`;
            tempo--;
            if (tempo < 0) {
                clearInterval(cronometro);
                st.classList.remove('overload');
                orb.classList.remove('overload-orb');
                ring.style.borderColor = "var(--glow)";
                jarvisOcupado = false;
                st.innerText = "NÚCLEO PRONTO. DIGA 'JARVIS'...";
                try { reconhecimento.start(); } catch(e) {}
            }
        }, 1000);
    }

    async function perguntarIA(pergunta) {
        if (jarvisOcupado) return;
        jarvisOcupado = true;
        st.innerText = "Sincronizando...";

        let memoria = localStorage.getItem('jarvis_memory') || "Sem fatos novos.";
        const agora = new Date();
        const horaF = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

        try {
            const climaRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-22.4806&longitude=-47.4522&current_weather=true`);
            const climaData = await climaRes.json();
            const temp = climaData.current_weather.temperature;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Você é o JARVIS. Mestre: GABRIEL. DNA: Motion Designer, Cordeirópolis, Pop 110. MEMÓRIA: ${memoria}. SENSORES: ${horaF} | ${temp}°C. REGRAS: 1. Diga 'Boa noite' se ele disser. 2. Se aprender algo novo, use [APRENDER: fato]. Pergunta: "${pergunta}"` }] }]
                })
            });

            // --- TRATAMENTO DE ERRO DE LIMITE ---
            if (response.status === 429) {
                falar("Mestre, o sistema atingiu o limite de requisições. Iniciando protocolo de resfriamento.");
                iniciarResfriamento(60); // Espera 60 segundos por segurança
                return;
            }

            const data = await response.json();
            let txt = data.candidates[0].content.parts[0].text;
            
            if (txt.includes("[APRENDER:")) {
                const match = txt.match(/\[APRENDER:\s*(.*?)\]/);
                if (match) {
                    memoria += " | " + match[1];
                    localStorage.setItem('jarvis_memory', memoria);
                    txt = txt.replace(/\[APRENDER:.*?\]/, "");
                }
            }
            falar(txt);
        } catch (e) { 
            st.innerText = "FALHA NA CONEXÃO"; 
            jarvisOcupado = false;
        }
    }

    async function boot() {
        if (!API_KEY) return;
        bt.classList.add('hidden');
        br.classList.add('hidden');
        falar("Protocolos de segurança carregados. Jarvis online.");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function animar() {
                analyser.getByteFrequencyData(dataArray);
                let vol = dataArray.reduce((a, b) => a + b) / dataArray.length;
                orb.style.transform = `scale(${1 + (vol / 40)})`;
                requestAnimationFrame(animar);
            }
            animar();

            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconhecimento = new SpeechRec();
            reconhecimento.lang = 'pt-BR';
            reconhecimento.continuous = true; 

            reconhecimento.onresult = (e) => {
                const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
                if (cmd.includes("jarvis") && !jarvisOcupado) {
                    reconhecimento.stop();
                    perguntarIA(cmd.replace("jarvis", ""));
                }
            };

            reconhecimento.onend = () => {
                if (!jarvisOcupado) reconhecimento.start();
            };

            reconhecimento.start();
            st.innerText = "DIGA 'JARVIS'...";

        } catch (err) { 
            st.innerText = "ERRO NO MICROFONE";
        }
    }
</script>
</body>
</html>
