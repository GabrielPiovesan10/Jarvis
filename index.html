<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - SCANNER DE MODELOS</title>
    <style>
        body { background: #000; color: #00d2ff; font-family: monospace; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #00d2ff; padding: 20px; box-shadow: 0 0 15px #00d2ff; }
        h2 { text-align: center; border-bottom: 1px solid #00d2ff; padding-bottom: 10px; }
        #lista-modelos { margin-top: 20px; font-size: 12px; line-height: 1.6; }
        .modelo-item { margin-bottom: 10px; padding: 5px; border-left: 3px solid #fff; background: rgba(255,255,255,0.1); }
        .id-tecnico { color: #fff; font-weight: bold; display: block; }
        button { width: 100%; padding: 15px; background: transparent; border: 1px solid #00d2ff; color: #00d2ff; cursor: pointer; font-weight: bold; }
        button:hover { background: #00d2ff; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <h2>SCANNER DE NÚCLEO</h2>
    <p>Clique abaixo para listar os modelos suportados pela sua chave:</p>
    <button onclick="listarModelos()">ESCANEAR API KEY</button>
    <div id="lista-modelos">Aguardando comando...</div>
</div>

<script>
    async function listarModelos() {
        const key = localStorage.getItem("GEMINI_API_KEY") || prompt("Insira sua API KEY para escanear:");
        if(!key) return;
        localStorage.setItem("GEMINI_API_KEY", key);
        
        const display = document.getElementById('lista-modelos');
        display.innerText = "Sincronizando com os servidores do Google...";

        try {
            // Este é o endpoint que lista todos os modelos disponíveis para a sua chave
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const data = await response.json();

            if (data.error) {
                display.innerHTML = `<span style="color:red">ERRO: ${data.error.message}</span>`;
                return;
            }

            let html = "<strong>MODELOS ENCONTRADOS:</strong><br><br>";
            data.models.forEach(m => {
                // Filtramos para mostrar apenas o que nos interessa (Flash e Pro)
                if(m.name.includes("flash") || m.name.includes("pro")) {
                    html += `
                    <div class="modelo-item">
                        <span class="id-tecnico">${m.name}</span>
                        <small>${m.displayName}</small><br>
                        <small style="color: #00ff00">Input: ${m.inputTokenLimit} | Output: ${m.outputTokenLimit}</small>
                    </div>`;
                }
            });
            display.innerHTML = html;

        } catch (e) {
            display.innerText = "Falha crítica na conexão.";
        }
    }
</script>

</body>
</html>
