<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>JARVIS OS - 3.1 LITE PREVIEW</title>
    <style>
        :root { --glow: #00d2ff; --bg: #000; --error: #ff4444; }
        body { background: var(--bg); color: var(--glow); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; justify-content:center; align-items:center; height:100vh; margin:0; overflow:hidden; }
        #hud { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; font-family: monospace; font-size: 10px; opacity: 0.8; color: var(--glow); text-shadow: 0 0 5px var(--glow); }
        .orb-container { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .orb { width: 105px; height: 105px; background: radial-gradient(circle, var(--glow) 0%, #004d7a 100%); border-radius: 50%; box-shadow: 0 0 60px var(--glow), inset 0 0 25px #fff; transition: transform 0.05s ease-out; z-index: 2; }
        .ring { position: absolute; width: 165px; height: 165px; border: 2px solid var(--glow); border-radius: 50%; border-top-color: transparent; border-bottom-color: transparent; animation: spin 3s linear infinite; opacity: 0.4; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status { text-transform: uppercase; letter-spacing: 2px; font-size: 10px; margin-top: 35px; text-align: center; color: #fff; min-height: 2em; }
        #user-text { font-family: monospace; font-size: 13px; color: rgba(0, 210, 255, 0.6); margin-top: 10px; text-align: center; max-width: 85%; font-style: italic; min-height: 1.5em; }
        .btn { padding: 15px 40px; background: transparent; border: 1px solid var(--glow); color: var(--glow); font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 25px; border-radius: 4px; transition: 0.3s; }
        .btn-reset { margin-top: 20px; font-size: 9px; padding: 5px 15px; border-color: #333; color: #555; }
        .overload-orb { background: radial-gradient(circle, var(--error) 0%, #7a0000 100%) !important; box-shadow: 0 0 60px var(--error) !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div>CORDEIRÓPOLIS-SP</div>
        <div id="hud-temp">--°C</div>
        <div id="hud-time">00:00:00</div>
    </div>

    <div class="orb-container" onclick="forcarReativacao()">
        <div class="ring"></div>
        <div id="orb" class="orb"></div>
    </div>

    <div id="status">SISTEMA EM AGUARDO</div>
    <div id="user-text"></div>

    <button id="btn" class="btn" onclick="boot()">ATIVAR NÚCLEO 3.1 PREVIEW</button>
    <button id="btn-reset" class="btn btn-reset" onclick="resetarChave()">RESETAR CHAVE</button>

<script>
    const orb = document.getElementById('orb'), st = document.getElementById('status'), ut = document.getElementById('user-text'), bt = document.getElementById('btn');
    let API_KEY = localStorage.getItem("GEMINI_API_KEY");
    let tempAtual = "20"; 
    let timerSilencio;

    function clock() { document.getElementById('hud-time').innerText = new Date().toLocaleTimeString('pt-BR'); }
    setInterval(clock, 1000);

    async function getClima() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-22.4806&longitude=-47.4522&current_weather=true`);
            const data = await res.json();
            tempAtual = Math.round(data.current_weather.temperature);
            document.getElementById('hud-temp').innerText = tempAtual + "°C";
        } catch(e) {}
    }
    getClima();

    function resetarChave() { localStorage.removeItem("GEMINI_API_KEY"); location.reload(); }
    
    let jarvisOcupado = false, resfriando = false, reconhecimento;

    function falar(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'pt-BR'; m.rate = 1.0; m.pitch = 0.8;
        m.onstart = () => { jarvisOcupado = true; st.innerText = "JARVIS FALANDO..."; ut.innerText = ""; };
        m.onend = () => { if(!resfriando) { st.innerText = "NÚCLEO PRONTO"; setTimeout(() => { jarvisOcupado = false; try{reconhecimento.start();}catch(e){} }, 1000); } };
        window.speechSynthesis.speak(m);
    }

    async function perguntarIA(pergunta) {
        if (jarvisOcupado || resfriando) return;
        jarvisOcupado = true;
        st.innerText = "SINCRONIZANDO 3.1 LITE...";
        const h = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        let memoria = localStorage.getItem('jarvis_memory') || "";

        try {
            // ID TÉCNICO CONFIRMADO NO SCANNER: gemini-3.1-flash-lite-preview
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Você é o JARVIS. Mestre: GABRIEL (Motion Designer). Local: Cordeirópolis. Agora são ${h} e faz ${tempAtual}°C. Lembre que ele teve dentista hoje às 14h. Responda em português fluído e inteligente. Memória: ${memoria}. Se aprender algo novo use [APRENDER: fato]. Pergunta: "${pergunta}"` }] }] })
            });

            if (!response.ok) {
                const err = await response.json();
                st.innerText = "ERRO: " + (err.error.message || "Tente novamente");
                jarvisOcupado = false;
                return;
            }

            const data = await response.json();
            let txt = data.candidates[0].content.parts[0].text;

            if (txt.includes("[APRENDER:")) {
                const fato = txt.match(/\[APRENDER:\s*(.*?)\]/);
                if (fato) {
                    localStorage.setItem('jarvis_memory', (localStorage.getItem('jarvis_memory') || "") + " | " + fato[1]);
                    txt = txt.replace(/\[APRENDER:.*?\]/, "");
                }
            }
            falar(txt);
        } catch (e) { st.innerText = "FALHA DE REDE"; jarvisOcupado = false; }
    }

    function forcarReativacao() {
        if (resfriando) return;
        ut.innerText = "";
        try { reconhecimento.stop(); } catch(e){}
        setTimeout(() => { try { reconhecimento.start(); st.innerText = "OUVINDO..."; jarvisOcupado = false; } catch(e){} }, 500);
    }

    async function boot() {
        if(!API_KEY) { API_KEY = prompt("API KEY:"); localStorage.setItem("GEMINI_API_KEY", API_KEY); }
        bt.classList.add('hidden');
        document.getElementById('btn-reset').classList.add('hidden');
        falar("Núcleo três ponto um sincronizado com sucesso. Jarvis online.");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function animar() {
                analyser.getByteFrequencyData(dataArray);
                let vol = dataArray.reduce((a, b) => a + b) / dataArray.length;
                orb.style.transform = `scale(${1 + (vol / 50)})`;
                requestAnimationFrame(animar);
            }
            animar();

            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconhecimento = new SpeechRec();
            reconhecimento.lang = 'pt-BR'; reconhecimento.continuous = true; reconhecimento.interimResults = true;

            reconhecimento.onresult = (e) => {
                const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
                ut.innerText = `"${transcript}"`;
                if (transcript.includes("jarvis") && !jarvisOcupado) {
                    clearTimeout(timerSilencio);
                    timerSilencio = setTimeout(() => {
                        reconhecimento.stop();
                        perguntarIA(transcript.split("jarvis").pop().trim());
                    }, 1200);
                }
            };
            reconhecimento.onend = () => { if(!jarvisOcupado) reconhecimento.start(); };
            reconhecimento.start();
        } catch (err) { st.innerText = "ERRO MICROFONE"; }
    }
</script>
</body>
</html>
